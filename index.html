<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>掲示板</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Noto Sans JP", "Hiragino Sans", sans-serif;
    background: #f7f8fa;
    color: #2d3748;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  h1 {
    text-align: center;
    font-size: 1.5rem;
    font-weight: 800;
    color: #3182ce;
    margin-bottom: 20px;
    letter-spacing: 1px;
  }

  /* ─── 認証バー ─── */
  .auth-bar {
    max-width: 560px;
    margin: 0 auto 24px;
    background: #fff;
    border-radius: 14px;
    padding: 16px 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  }

  .auth-status {
    font-size: 0.88rem;
    color: #718096;
    margin-bottom: 12px;
    text-align: center;
  }

  .auth-status span { font-weight: 700; color: #38a169; }

  .auth-fields {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 10px;
  }

  .auth-fields input {
    width: 100%;
    padding: 10px 14px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    font-size: 0.95rem;
    font-family: inherit;
    outline: none;
    background: #f7f8fa;
    transition: border-color 0.2s;
  }

  .auth-fields input:focus {
    border-color: #3182ce;
    background: #fff;
  }

  .auth-btns {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .auth-btns button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, opacity 0.2s;
  }

  .btn-signup   { background: #48bb78; color: #fff; }
  .btn-login    { background: #3182ce; color: #fff; }
  .btn-logout   { background: #fc8181; color: #fff; width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: background 0.2s; }

  .btn-signup:hover { background: #38a169; }
  .btn-login:hover  { background: #2b6cb0; }
  .btn-logout:hover { background: #e53e3e; }

  .auth-msg {
    text-align: center;
    font-size: 0.82rem;
    margin-top: 8px;
    min-height: 18px;
  }
  .auth-msg.success { color: #38a169; }
  .auth-msg.error   { color: #e53e3e; }

  /* ─── 投稿フォーム ─── */
  .form-card {
    background: #fff;
    border-radius: 14px;
    padding: 20px;
    max-width: 560px;
    margin: 0 auto 32px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  }

  .form-card label {
    display: block;
    font-size: 0.82rem;
    font-weight: 700;
    color: #718096;
    margin-bottom: 6px;
    margin-top: 14px;
  }

  .form-card label:first-child { margin-top: 0; }

  .form-card input,
  .form-card textarea {
    width: 100%;
    padding: 10px 14px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    font-size: 0.97rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
    background: #f7f8fa;
  }

  .form-card input:focus,
  .form-card textarea:focus {
    border-color: #3182ce;
    background: #fff;
  }

  .form-card textarea {
    resize: vertical;
    min-height: 90px;
  }

  .submit-btn {
    width: 100%;
    margin-top: 16px;
    padding: 13px;
    background: #3182ce;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }

  .submit-btn:hover { background: #2b6cb0; }
  .submit-btn:disabled { background: #a0aec0; cursor: not-allowed; }

  .msg {
    text-align: center;
    font-size: 0.88rem;
    margin-top: 10px;
    min-height: 20px;
  }

  .msg.success { color: #38a169; }
  .msg.error   { color: #e53e3e; }

  .login-required {
    text-align: center;
    color: #a0aec0;
    font-size: 0.92rem;
    padding: 20px 0 8px;
  }

  /* ─── 投稿一覧 ─── */
  .posts-header {
    max-width: 560px;
    margin: 0 auto 12px;
    font-size: 0.88rem;
    font-weight: 700;
    color: #718096;
    letter-spacing: 1px;
  }

  .post-list {
    max-width: 560px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .post-card {
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }

  .post-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    gap: 8px;
  }

  .post-author {
    font-weight: 700;
    font-size: 0.92rem;
    color: #3182ce;
  }

  .post-date {
    font-size: 0.78rem;
    color: #a0aec0;
    white-space: nowrap;
  }

  .post-content {
    font-size: 0.95rem;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .empty   { text-align: center; color: #a0aec0; padding: 40px 0; font-size: 0.95rem; }
  .loading { text-align: center; color: #a0aec0; padding: 32px 0; }

  .hidden { display: none; }
</style>
</head>
<body>

<h1>💬 掲示板</h1>

<!-- 認証バー -->
<div class="auth-bar">
  <!-- 未ログイン時 -->
  <div id="authForm">
    <div class="auth-status">ログインしていません</div>
    <div class="auth-fields">
      <input type="email"    id="authEmail"    placeholder="メールアドレス" />
      <input type="password" id="authPassword" placeholder="パスワード" />
    </div>
    <div class="auth-btns">
      <button class="btn-signup" id="signupBtn">新規登録</button>
      <button class="btn-login"  id="loginBtn">ログイン</button>
    </div>
    <div class="auth-msg" id="authMsg"></div>
  </div>
  <!-- ログイン中 -->
  <div id="authUser" class="hidden">
    <div class="auth-status">ログイン中：<span id="userEmail"></span></div>
    <button class="btn-logout" id="logoutBtn">ログアウト</button>
  </div>
</div>

<!-- 投稿フォーム（ログイン時のみ表示） -->
<div class="form-card" id="postForm">
  <div class="login-required" id="loginNotice">投稿するにはログインしてください</div>
  <div id="postFields" class="hidden">
    <label>投稿者名（任意）</label>
    <input type="text" id="author" placeholder="名無しさん" maxlength="50" />
    <label>投稿内容</label>
    <textarea id="content" placeholder="メッセージを入力..." maxlength="1000"></textarea>
    <button class="submit-btn" id="submitBtn">投稿する</button>
    <div class="msg" id="msg"></div>
  </div>
</div>

<div class="posts-header">投稿一覧</div>
<div class="post-list" id="postList">
  <div class="loading">読み込み中...</div>
</div>

<script>
  const SUPABASE_URL = 'YOUR_SUPABASE_URL';
  const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  const submitBtn  = document.getElementById('submitBtn');
  const msg        = document.getElementById('msg');
  const postList   = document.getElementById('postList');
  const authMsg    = document.getElementById('authMsg');
  const authForm   = document.getElementById('authForm');
  const authUser   = document.getElementById('authUser');
  const userEmail  = document.getElementById('userEmail');
  const postFields = document.getElementById('postFields');
  const loginNotice= document.getElementById('loginNotice');

  // ─── 認証状態の反映 ───
  function applySession(session) {
    if (session) {
      authForm.classList.add('hidden');
      authUser.classList.remove('hidden');
      userEmail.textContent = session.user.email;
      postFields.classList.remove('hidden');
      loginNotice.classList.add('hidden');
    } else {
      authForm.classList.remove('hidden');
      authUser.classList.add('hidden');
      postFields.classList.add('hidden');
      loginNotice.classList.remove('hidden');
    }
  }

  db.auth.getSession().then(({ data }) => applySession(data.session));

  db.auth.onAuthStateChange((_event, session) => applySession(session));

  // ─── 新規登録 ───
  document.getElementById('signupBtn').addEventListener('click', async () => {
    const email    = document.getElementById('authEmail').value.trim();
    const password = document.getElementById('authPassword').value;
    if (!email || !password) { showAuthMsg('メールとパスワードを入力してください', 'error'); return; }
    const { error } = await db.auth.signUp({ email, password });
    if (error) showAuthMsg(error.message, 'error');
    else showAuthMsg('確認メールを送りました。メールを確認してください。', 'success');
  });

  // ─── ログイン ───
  document.getElementById('loginBtn').addEventListener('click', async () => {
    const email    = document.getElementById('authEmail').value.trim();
    const password = document.getElementById('authPassword').value;
    if (!email || !password) { showAuthMsg('メールとパスワードを入力してください', 'error'); return; }
    const { error } = await db.auth.signInWithPassword({ email, password });
    if (error) showAuthMsg(error.message, 'error');
  });

  // ─── ログアウト ───
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await db.auth.signOut();
  });

  // ─── 投稿 ───
  submitBtn.addEventListener('click', async () => {
    const author  = document.getElementById('author').value.trim();
    const content = document.getElementById('content').value.trim();
    if (!content) { showMsg('投稿内容を入力してください。', 'error'); return; }

    submitBtn.disabled = true;
    showMsg('投稿中...', '');

    const { error } = await db.from('messages').insert([{
      name: author || '名無しさん',
      body: content,
      room: 'general'
    }]);

    if (error) showMsg('投稿に失敗しました: ' + error.message, 'error');
    else {
      document.getElementById('content').value = '';
      showMsg('投稿しました！', 'success');
      await loadPosts();
    }
    submitBtn.disabled = false;
  });

  // ─── 投稿一覧 ───
  async function loadPosts() {
    const { data, error } = await db
      .from('messages')
      .select('*')
      .order('id', { ascending: false })
      .limit(50);

    if (error) { postList.innerHTML = '<div class="empty">投稿の読み込みに失敗しました。</div>'; return; }
    if (!data || data.length === 0) { postList.innerHTML = '<div class="empty">まだ投稿がありません。</div>'; return; }

    postList.innerHTML = data.map(p => `
      <div class="post-card">
        <div class="post-meta">
          <span class="post-author">${esc(p.name || '名無しさん')}</span>
          <span class="post-date">${formatDate(p.created_at)}</span>
        </div>
        <div class="post-content">${esc(p.body || '')}</div>
      </div>
    `).join('');
  }

  function showMsg(text, type)     { msg.textContent = text;     msg.className = 'msg ' + type; }
  function showAuthMsg(text, type) { authMsg.textContent = text; authMsg.className = 'auth-msg ' + type; }

  function formatDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleString('ja-JP', {
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit'
    });
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadPosts();
</script>
</body>
</html>
